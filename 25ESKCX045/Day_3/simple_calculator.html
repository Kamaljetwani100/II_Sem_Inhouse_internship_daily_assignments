<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body{display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,Helvetica,sans-serif;background:#f4f4f4}
        .calc{background:#fff;padding:16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.12);width:260px}
        #display{width:100%;height:48px;font-size:20px;padding:6px 10px;margin-bottom:10px;box-sizing:border-box;text-align:right;border:1px solid #ccc;border-radius:4px}
        .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
        button{padding:12px;font-size:16px;border-radius:6px;border:1px solid #ccc;background:#f0f0f0;cursor:pointer}
        button.op{background:#ffd966}
        button.equal{background:#6aa84f;color:#fff;grid-column:span 2}
        button.clear{background:#e06666;color:#fff}
    </style>
</head>
<body>
    <div class="calc">
        <input id="display" type="text" readonly placeholder="0">
        <div class="keys">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="append('%')">%</button>
            <button class="op" onclick="append('/')">÷</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="op" onclick="append('*')">×</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="op" onclick="append('-')">−</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="op" onclick="append('+')">+</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        // ...existing code...
        const display = document.getElementById('display');

        function append(val){
            if(display.value === '0' && val !== '.') display.value = val;
            else display.value += val;
        }

        function clearDisplay(){
            display.value = '';
        }

        function backspace(){
            display.value = display.value.slice(0, -1);
        }

        function calculate(){
            try{
                // replace percent with division by 100 for simple support
                let expr = display.value.replace(/%/g, '/100');
                // evaluate safely for basic arithmetic
                const result = Function('"use strict";return (' + expr + ')')();
                display.value = (result === undefined)? '' : String(result);
            }catch(e){
                display.value = 'Error';
                setTimeout(()=> display.value = '', 900);
            }
        }

        // optional: allow keyboard input for convenience
        document.addEventListener('keydown', (e)=>{
            const allowed = '0123456789+-*/.%';
            if(e.key === 'Enter') { e.preventDefault(); calculate(); }
            else if(e.key === 'Backspace'){ backspace(); }
            else if(e.key === 'Escape'){ clearDisplay(); }
            else if(allowed.includes(e.key)){ append(e.key); }
        });
        // ...existing code...
    </script>
</body>
</html>
